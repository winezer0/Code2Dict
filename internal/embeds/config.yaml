presets:
  common:
    description: "常见的代码文件规则"
    include:
    exclude:
      # 图片格式（原有+补充）
      - jpg
      - jpeg
      - png
      - bmp
      - ico
      - gif
      - tiff
      - webp
      - svg
      - heic
      # 样式/字体（原有+补充）
      - css
      - scss
      - less
      - woff
      - woff2
      - ttf
      - otf
      - eot
      # 音视频（原有+补充）
      - mp3
      - mp4
      - avi
      - mov
      - flv
      - wmv
      - mkv
      - wav
      - aac
      - ogg
      # 压缩包（原有+补充）
      - zip
      - tar.gz
      - gz
      - bz2
      - 7z
      - rar
      - iso
      - dmg
      # 编译/构建产物
      - a
      - lib
      - obj
      - pyc
      - pyo
      - pyd
      - o
      - out
      - bin
      # 日志文件
      - txt.log
      - log.txt
      - debug
      - error
      # 缓存/临时文件
      - cache
      - temp
      - tmp
      - backup
      - old
      # 其他冗余文件
      - csv
      - xlsx
      - xls
      - docx
      - doc
      - pptx
      - ppt
      - pdf
      - db
      - sqlite
      - lock
      - pid
    ignored:
      # 版本控制/构建目录
      - ".git"
      - ".svn"
      - ".hg"
      - ".bzr"
      - "node_modules"
      - "out"
      - "bin"
      - "obj"
      # 缓存目录
      - ".cache"
      - ".temp"
      - "tmp"
      - "temp"
      # 依赖管理目录
      - "vendor"
      - "deps"
      # 编辑器/IDE配置目录
      - ".idea"
      - ".vscode"
      - ".eclipse"
      - ".netbeans"
      - ".sublime"
      # 系统/工具目录
      - "__pycache__"
