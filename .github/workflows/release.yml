name: Release Build

on:
  # 1. 仅监听真正需要的事件：
  # - published: 正式发布（非草稿）
  # - prereleased: 预发布（如 v1.0.0-rc1）
  release:
    types: [published, prereleased]

  # 2. 手动触发：允许用户输入版本号
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
        default: 'v0.0.1'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: code2dict-linux-amd64
          - os: windows-latest
            asset_name: code2dict-windows-amd64.exe
          - os: macos-latest
            asset_name: code2dict-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Configure Private Modules Access
        shell: bash
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          go env -w GOPRIVATE=github.com/winezer0/*
          git config --global url."https://${PAT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Clean Go module cache (optional)
        run: go clean -modcache

      - name: Build
        shell: bash
        run: |
          go mod tidy
          if [ "${{ runner.os }}" == "macOS" ]; then
            export GOARCH=arm64
          fi
          go build -v -trimpath -ldflags "-s -w" -o ${{ matrix.asset_name }} ./cmd/code2dict

      # 新增：压缩二进制文件为 tar.gz
      - name: Compress binary with tar.gz
        shell: bash
        run: |
          BIN="${{ matrix.asset_name }}"
          ARCHIVE="${BIN}.tar.gz"
          tar -czvf "$ARCHIVE" "$BIN"
          rm -f "$BIN"  # 压缩后删除原始 bin，只保留压缩包

      # 上传压缩包（Release 自动触发）
      - name: Upload Release Asset (from existing release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.tar.gz

      # 手动触发：创建 Release 并上传压缩包
      - name: Create or Update Release (from manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'rc') }}
          files: ${{ matrix.asset_name }}.tar.gz